# Deploys straight from a git checkout: run from the repo root as
#   docker compose -f deploy/docker-compose.yml up -d --build
# (or just run deploy/update.sh, which the daily cron calls).
# The tunnel token lives in deploy/.env (gitignored):  TUNNEL_TOKEN=...
services:
  website:
    build:
      context: ..                 # repo root, so the Dockerfile sees css/ js/ index.html
      dockerfile: deploy/Dockerfile
    container_name: WebSWR
    read_only: true
    restart: unless-stopped
    security_opt:  #Have to disable if using the Ubuntu SNAP package for docker
      - no-new-privileges=true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
          pids: 512
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256M
      - /run:rw,noexec,nosuid,nodev,size=64M
      - /var/cache/nginx/:rw,noexec,nosuid,nodev,size=256M
    networks:
      - web
  cloudflare_tunnel:
    user: 7000:7000
    container_name: cloudflared-tunnel-FBCC
    image: cloudflare/cloudflared
    read_only: true
    cpu_shares: 768
    deploy:
     resources:
       limits:
          memory: 256M
          pids: 4096
    cap_drop:
      - ALL
    security_opt:
        - no-new-privileges=true
    restart: unless-stopped
    command: tunnel run
    environment:
      # Read from deploy/.env (compose auto-loads .env beside this file) so a
      # `git pull` / `git reset --hard` can never wipe the real token.
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    networks:
      web:
networks:
  web: