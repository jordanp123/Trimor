# Deployment values come from config.webswr via update.sh (which exports them
# for the ${VAR:-default} substitutions below). The defaults equal the stock
# deployment, so a bare `docker compose up -d` still works on a default setup;
# on a customized box, run update.sh (or export the config first). The compose
# project name stays auto-derived from the webroot directory name, which keeps
# network names unique per stack without another variable.
services:
  website:
    build:
      context: .
      args:
        SUBPATH: ${SUBPATH:-webswr}
    container_name: ${STACK_NAME:-WebSWR}
    read_only: true
    user: "${APP_UID:-17001}:${APP_UID:-17001}"
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
          pids: 512
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256M
      - /run:rw,noexec,nosuid,nodev,size=64M
      - /var/cache/nginx/:rw,noexec,nosuid,nodev,size=256M
    networks:
      - backend
  cloudflare_tunnel:
    user: "${TUNNEL_UID:-17000}:${TUNNEL_UID:-17000}"
    container_name: cloudflared-tunnel-${STACK_NAME:-WebSWR}
    image: cloudflare/cloudflared
    read_only: true
    cpu_shares: 768
    deploy:
     resources:
       limits:
          memory: 256M
          pids: 4096
    cap_drop:
      - ALL
    security_opt:
        - no-new-privileges=true
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    networks:
      - backend
      - egress
# backend is internal-only: the nginx container can answer cloudflared but has
# NO route to the internet at all (it's a static file server; zero egress
# need). Only cloudflared can reach out, via egress, to the Cloudflare edge.
# Renamed from "web" (not modified in place) because docker can't reconfigure
# an existing network -- new names let the unattended `compose up -d` create
# them cleanly; the orphaned "web" network is unused and pruned next run.
networks:
  backend:
    internal: true
  egress:
