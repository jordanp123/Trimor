server {
    listen 8080;
    # Catch-all: host routing is the Cloudflare tunnel's job, and this
    # container is reachable only through it (internal network, no published
    # ports). Keeping `_` here means nothing in this file is deploy-specific.
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    #Compression
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 64;

    # ── Hide Nginx version from error pages and headers ──────────────
    server_tokens off;

    # ── Security headers (see SECURITY.md "Deployment hardening") ────
    # A header CSP is stronger than the <meta> fallback in index.html, and
    # frame-ancestors (clickjacking protection) ONLY works as a header —
    # browsers ignore it inside a <meta> CSP. `always` = also on 404/405.
    #
    # 'nonce-$request_id': a fresh 16-random-byte nonce per response (HTML is
    # no-cache end to end, so nonces are never reused). We ship no inline
    # scripts ourselves — the nonce exists for Cloudflare's bot-detection
    # (JavaScript Detections), which reads this header at the edge and stamps
    # the nonce onto the inline script it injects. Everything else inline
    # stays blocked exactly as before.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' 'nonce-$request_id'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; worker-src 'self'; manifest-src 'self'; object-src 'none'; child-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Caching: filenames are NOT content-hashed and js/cape-data.js is
    # regenerated DAILY by the cron, so nothing here may be cached as
    # immutable — a year-long "immutable" would pin stale data (and a stale
    # worker.js) at the browser and the Cloudflare edge. no-cache still
    # allows conditional revalidation: unchanged files answer with 304s.
    add_header Cache-Control "no-cache" always;

    # ── Only allow GET and HEAD — no POST, PUT, DELETE etc ───────────
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # ── Clean URLs ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # (No immutable static-asset block: the image ships only html/css/js —
    # all daily-refreshable — and a location-level add_header would silently
    # DROP every inherited security header above.)

    # ── Block access to hidden files (.git, .env etc) ─────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Block common exploit probes ───────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl|rb)$ {
        deny all;
        return 404;
    }

    # ── Custom 404 ────────────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
